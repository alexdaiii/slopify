schemaVersion: "1"
kind: mixin
name: claude-superpowers
displayName: Claude Code + Superpowers Plugin
description: Claude Code with PyCharm + DeepWiki MCP servers and the obra/superpowers plugin (auto-installed via the official marketplace on first launch).

commands:
  # Deep-merge kit settings.json into ~/.claude/settings.json on every
  # sandbox start. See claude/base/spec.yaml and merge_settings.py docstring.
  startup:
    - command:
        - python3
        - -B
        - /home/agent/.config/agents/merge_settings.py
      description: Deep-merge kit settings.json into ~/.claude/settings.json

  initFiles:
    - path: /home/agent/.claude.json
      onlyIfMissing: true
      content: |
        {
          "mcpServers": {
            "pycharm": {
              "type": "sse",
              "url": "http://host.docker.internal:64342/sse",
              "headers": {}
            },
            "deepwiki": {
              "type": "http",
              "url": "https://mcp.deepwiki.com/mcp"
            }
          }
        }
    # Proxy-managed Claude Code OAuth placeholder — sbx proxy swaps the
    # access token for the real Authorization header. See claude/base
    # for the full explanation. Minimal payload (no subscriptionType /
    # rateLimitTier) confirmed working 2026-05.
    - path: /home/agent/.claude/.credentials.json
      onlyIfMissing: true
      content: |
        {
          "claudeAiOauth": {
            "accessToken": "sk-ant-oat01-proxy-managed",
            "refreshToken": "sk-ant-ort01-proxy-managed",
            "expiresAt": 9999999999999,
            "scopes": [
              "user:file_upload",
              "user:inference",
              "user:mcp_servers",
              "user:profile",
              "user:sessions:claude_code"
            ]
          }
        }


network:
  allowedDomains:
    # DeepWiki MCP
    - mcp.deepwiki.com
    # Claude Code fetches the plugin from GitHub the first time it is enabled.
    # If you see HTTP 403 "blocked by network policy" on first launch, widen
    # this list to whatever host the proxy log reports next (likely
    # objects.githubusercontent.com or raw.githubusercontent.com).
    - github.com
    - codeload.github.com
    - api.github.com
