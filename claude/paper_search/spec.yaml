schemaVersion: "1"
kind: mixin
name: claude-paper-search
displayName: Claude Paper Search
description: Claude Code with PyCharm + DeepWiki + Semantic Scholar MCP servers

commands:
  # Deep-merge kit settings.json into ~/.claude/settings.json on every
  # sandbox start. See claude/base/spec.yaml and merge_settings.py docstring.
  startup:
    - command:
        - python3
        - -B
        - /home/agent/.config/agents/merge_settings.py
      description: Deep-merge kit settings.json into ~/.claude/settings.json

  initFiles:
    - path: /home/agent/.claude.json
      onlyIfMissing: true
      content: |
        {
          "mcpServers": {
            "pycharm": {
              "type": "sse",
              "url": "http://host.docker.internal:64342/sse",
              "headers": {}
            },
            "deepwiki": {
              "type": "http",
              "url": "https://mcp.deepwiki.com/mcp"
            },
            "semanticscholar": {
              "type": "http",
              "url": "https://asta-tools.allen.ai/mcp/v1",
              "headers": {
                "x-api-key": "proxy-managed"
              }
            }
          }
        }
    # Proxy-managed Claude Code OAuth placeholder — sbx proxy swaps the
    # access token for the real Authorization header. See claude/base
    # for the full explanation. Minimal payload (no subscriptionType /
    # rateLimitTier) confirmed working 2026-05.
    - path: /home/agent/.claude/.credentials.json
      onlyIfMissing: true
      content: |
        {
          "claudeAiOauth": {
            "accessToken": "sk-ant-oat01-proxy-managed",
            "refreshToken": "sk-ant-ort01-proxy-managed",
            "expiresAt": 9999999999999,
            "scopes": [
              "user:file_upload",
              "user:inference",
              "user:mcp_servers",
              "user:profile",
              "user:sessions:claude_code"
            ]
          }
        }



network:
  allowedDomains:
    - mcp.deepwiki.com
    - asta-tools.allen.ai
    # planning-with-files plugin fetch (first launch).
    - github.com
    - codeload.github.com
    - api.github.com
  serviceDomains:
    asta-tools.allen.ai: allenai
  serviceAuth:
    allenai:
      headerName: x-api-key
      valueFormat: "%s"


credentials:
  sources:
    allenai:
      env:
        - ALLEN_AI_KEY

environment:
  proxyManaged:
    - ALLEN_AI_KEY
