schemaVersion: "1"
kind: mixin
name: opencode-go-auth
displayName: OpenCode Go Auth Base
description: Base Kit for injecting authentication for OpenCode Go

commands:
  install:
    - command: |
        mkdir -p /home/agent/.agents/skills
        git clone --depth 1 https://github.com/OthmanAdi/planning-with-files.git /tmp/pwf
        cp -r /tmp/pwf/skills/planning-with-files /home/agent/.agents/skills
        rm -rf /tmp/pwf


network:
  allowedDomains:
    - opencode.ai
    - asta-tools.allen.ai
  serviceDomains:
    opencode.ai: opencode # Tag traffic to this domain
    asta-tools.allen.ai: allenai
  serviceAuth:
    opencode:
      headerName: Authorization # Overwrite this header
      valueFormat: "Bearer %s"
    allenai:
      headerName: x-api-key
      valueFormat: "%s"


credentials:
  sources:
    opencode:
      env:
        - OPENCODE_API_KEY # Host-side credential lookup
    allenai:
      env:
        - ALLEN_AI_KEY

environment:
  proxyManaged:
    - OPENCODE_API_KEY # Set the in-VM env var to "proxy-managed"
    - ALLEN_AI_KEY
  variables:
    # required to enable websearch (NON PRIVACY!)
    OPENCODE_ENABLE_EXA: 1