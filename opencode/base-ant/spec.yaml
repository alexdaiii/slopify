schemaVersion: "1"
kind: mixin
name: opencode-go-auth-ant
displayName: OpenCode Go Auth (Anthropic Endpoints)
description: Base Kit for injecting authentication for OpenCode Go (x-api-key auth, MiniMax M3 model)

commands:
  install:
    - command: |
        mkdir -p /home/agent/.agents/skills
        git clone --depth 1 https://github.com/OthmanAdi/planning-with-files.git /tmp/pwf
        cp -r /tmp/pwf/skills/planning-with-files /home/agent/.agents/skills
        rm -rf /tmp/pwf


network:
  allowedDomains:
    - opencode.ai
    - asta-tools.allen.ai
  serviceDomains:
    opencode.ai: opencode
    asta-tools.allen.ai: allenai
  serviceAuth:
    opencode:
      headerName: x-api-key
      valueFormat: "%s"
    allenai:
      headerName: x-api-key
      valueFormat: "%s"


credentials:
  sources:
    opencode:
      env:
        - OPENCODE_API_KEY
    allenai:
      env:
        - ALLEN_AI_KEY

environment:
  proxyManaged:
    - OPENCODE_API_KEY
    - ALLEN_AI_KEY
  variables:
    OPENCODE_ENABLE_EXA: 1