schemaVersion: "1"
kind: mixin
name: opencode-go-auth-ant
displayName: OpenCode Go Auth (Anthropic Endpoints)
description: Playwright Kit with x-api-key auth and MiniMax M3 model

commands:
  install:
    - command: |
        mkdir -p /home/agent/.agents/skills
        git clone --depth 1 https://github.com/OthmanAdi/planning-with-files.git /tmp/pwf
        cp -r /tmp/pwf/skills/planning-with-files /home/agent/.agents/skills
        rm -rf /tmp/pwf
  initFiles:
    - path: /home/agent/.config/opencode/opencode.jsonc
      content: |
        {
          "$schema": "https://opencode.ai/config.json",
          "model": "opencode-go/minimax-m3",
          "enabled_providers": [
            "opencode-go",
            "opencode"
          ],
          "mcp": {
              "pycharm": {
                "enabled": true,
                "type": "remote",
                "url": "http://host.docker.internal:64342/sse",
                "headers": {}
              },
              "deepwiki": {
                "enabled": true,
                "type": "remote",
                "url": "https://mcp.deepwiki.com/mcp"
              },
              "playright": {
                "enabled": true,
                "type": "local",
                "command": ["npx", "@playwright/mcp@latest"]
              }
          },
          "permission": "allow"
        }
      onlyIfMissing: true


network:
  allowedDomains:
    - opencode.ai
    - asta-tools.allen.ai
  serviceDomains:
    opencode.ai: opencode
    asta-tools.allen.ai: allenai
  serviceAuth:
    opencode:
      headerName: x-api-key
      valueFormat: "%s"
    allenai:
      headerName: x-api-key
      valueFormat: "%s"


credentials:
  sources:
    opencode:
      env:
        - OPENCODE_API_KEY
    allenai:
      env:
        - ALLEN_AI_KEY

environment:
  proxyManaged:
    - OPENCODE_API_KEY
    - ALLEN_AI_KEY
  variables:
    OPENCODE_ENABLE_EXA: 1